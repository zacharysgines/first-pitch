name: Check Lineups

on:
  schedule:
    - cron: "17 14-23 * * *"
  workflow_dispatch:

concurrency:
  group: check-lineups
  cancel-in-progress: true

jobs:
  check-lineups:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lineup check
        run: python scripts/check_lineups.py

      - name: Commit updated lineup files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scores/lineups.json game_scores.json
          git diff --cached --quiet || git commit -m "Update lineup snapshots"
          git push
