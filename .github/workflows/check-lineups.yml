name: Check Lineups

on:
  schedule:
    - cron: "37 16-23 * * *"
    - cron: "37 0-1 * * *"
  workflow_dispatch:

concurrency:
  group: check-lineups
  cancel-in-progress: true

jobs:
  check-lineups:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lineup check
        run: python scripts/check_lineups.py
