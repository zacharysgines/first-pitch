name: Refresh daily game scores

on:
  schedule:
    # 12:00 UTC = 5:00 AM MST / 6:00 AM MDT
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-scores
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh script
        run: |
          python scripts/update_scores.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add game_scores.json
          git diff --cached --quiet || git commit -m "Refresh game scores (scheduled)"
          git push
